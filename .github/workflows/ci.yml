# CI/CD Pipeline — NHS Medical Document Processor
#
# Triggers:
#   - Every push and PR to main
#
# Jobs:
#   1. lint    — ruff (fast Python linter)
#   2. test    — pytest on Python 3.11 (no ML deps, 164 tests)
#   3. docker  — build & push image to GHCR (main branch only)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write      # for GHCR push

jobs:
  # ── Lint ────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check backend/ frontend/app.py --select E,F,W --ignore E501

  # ── Test ────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flask-limiter
          python -m spacy download en_core_web_sm

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short -q

      - name: Verify app imports cleanly
        run: python -c "from frontend.app import create_app; app = create_app(); print('OK')"

  # ── Docker Build & Push ─────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
