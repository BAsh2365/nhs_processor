# nginx reverse proxy for NHS Medical Document Processor
#
# Provides:
#   - TLS termination (HTTPS)
#   - Rate limiting at the edge
#   - Request size limits
#   - Security headers
#   - Proxy to gunicorn on localhost:5000
#
# Usage:
#   1. Place TLS certs at /etc/ssl/nhs-processor/ (or update paths below)
#   2. Copy this file to /etc/nginx/sites-available/nhs-processor
#   3. ln -s /etc/nginx/sites-available/nhs-processor /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx

# Rate limit zone: 10 requests/sec per IP, 10MB shared memory
limit_req_zone $binary_remote_addr zone=nhs_api:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # ── TLS Configuration ─────────────────────────────────────────
    # Replace with your actual certificate paths (Let's Encrypt, ACM, etc.)
    ssl_certificate     /etc/ssl/nhs-processor/fullchain.pem;
    ssl_certificate_key /etc/ssl/nhs-processor/privkey.pem;

    # Modern TLS settings (TLS 1.2+ only)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Session tickets
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # ── Security Headers ──────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none'" always;

    # ── Request Limits ────────────────────────────────────────────
    client_max_body_size 16m;

    # ── Health check (no rate limit, no auth) ─────────────────────
    location /health {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Document processing (strict rate limit) ───────────────────
    location /process {
        limit_req zone=nhs_api burst=5 nodelay;

        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for model inference
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── All other routes ──────────────────────────────────────────
    location / {
        limit_req zone=nhs_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Deny hidden files ─────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
