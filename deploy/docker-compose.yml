# docker-compose.yml — Full production stack
#
# Usage:
#   cd deploy/
#   docker compose up -d
#
# Prerequisites:
#   - Place TLS certs in ./certs/ (or generate with generate-self-signed-cert.sh)
#   - Copy ../.env.example to ../.env and configure NHS_API_KEYS
#
# For GPU support, use:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: nhs-processor-app
    restart: unless-stopped
    env_file: ../.env
    environment:
      - PYTHONUNBUFFERED=1
    expose:
      - "5000"
    volumes:
      - audit-logs:/app/backend/audit_logs
      - kb-store:/app/backend/kb_chroma_store
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    container_name: nhs-processor-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/ssl/nhs-processor:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  audit-logs:
  kb-store:
